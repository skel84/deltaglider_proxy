# =============================================================================
# DeltaGlider Proxy — example Docker Compose deployment
# =============================================================================
# A complete, generic deployment. Pairs with:
#   - deltaglider_proxy.yaml   (config; secrets are ${env:NAME} placeholders)
#   - secrets.env              (your real secret values — gitignored, NOT here)
#
# DeltaGlider expands ${env:NAME} / ${env:NAME:-default} in the config itself
# when it loads the file, so the raw YAML is mounted as-is and the environment
# supplies the values — no envsubst / templating step. An unset ${env:...}
# placeholder fails the proxy loudly at startup.
#
# Quick start:
#   1. cp secrets.env.example secrets.env   &&  edit secrets.env
#   2. docker compose up -d
#   3. open http://localhost:9000/_/        (admin GUI; S3 API on the same port)
# =============================================================================

services:
  # One-time: make the config volume writable by the proxy's non-root user (999)
  # so it can create its encrypted config DB there. (A fresh named volume is
  # root-owned; the image runs as uid 999.) No rendering happens here.
  init-perms:
    image: beshultd/deltaglider_proxy:${DGP_IMAGE_TAG:-latest}
    user: "0:0"
    entrypoint: ["/bin/sh", "-c", "chown 999:999 /etc/deltaglider_proxy && chmod 750 /etc/deltaglider_proxy"]
    volumes:
      - dgp-config:/etc/deltaglider_proxy
    restart: "no"

  deltaglider:
    image: beshultd/deltaglider_proxy:${DGP_IMAGE_TAG:-latest}
    depends_on:
      init-perms:
        condition: service_completed_successfully
    # secrets.env supplies BOTH the native DGP_* env vars AND the ${env:...}
    # values the config references. The proxy reads them as a docker env_file
    # (literal KEY=value — no shell expansion, safe for a $-laden bcrypt hash).
    env_file:
      - secrets.env
    environment:
      DGP_CONFIG: /etc/deltaglider_proxy/deltaglider_proxy.yaml
    ports:
      - "9000:9000"
    volumes:
      # The config template, mounted read-only. The proxy expands its ${env:...}
      # placeholders in memory at load — the file on disk stays secret-free.
      - ./deltaglider_proxy.yaml:/etc/deltaglider_proxy/deltaglider_proxy.yaml:ro
      # Writable dir for the encrypted config DB (deltaglider_config.db lands in
      # DGP_CONFIG's parent dir). PERSIST + back this up — it holds your IAM data.
      - dgp-config:/etc/deltaglider_proxy
      # Local scratch for delta reconstruction + caches. Object data lives in the
      # S3 backend, not here, but reconstruction buffers to disk.
      - dgp-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/_/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped

volumes:
  dgp-config:   # encrypted config DB — back this up
  dgp-data:     # delta/reconstruction scratch + caches
