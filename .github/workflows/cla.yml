name: CLA Assistant

# Triggered on every PR open/sync, and on issue comments
# (so contributors can post the "I have read the CLA Document and I
# hereby sign the CLA" trigger phrase to record their signature).
on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

# Required permissions for the CLA bot:
# - contents: write     → update the signatures file
# - pull-requests: write → comment + label PRs
# - statuses: write     → set the CLA check status on the PR
# - actions: write      → re-run the workflow when signature is added
permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

jobs:
  cla-check:
    runs-on: ubuntu-latest
    # Skip on bot PRs (Dependabot, Renovate, etc) — they don't need to sign.
    if: >
      (github.event.comment.html_url != null &&
        contains(github.event.comment.body, 'I have read the CLA Document and I hereby sign the CLA'))
      ||
      (github.event_name == 'pull_request_target' &&
       github.event.pull_request.user.type != 'Bot')
    steps:
      - name: CLA Assistant
        uses: contributor-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          path-to-signatures: '.cla-signatures/signatures.json'
          path-to-document: 'https://github.com/beshu-tech/deltaglider_proxy/blob/main/CLA.md'
          branch: 'main'
          # Trigger phrase the contributor types as a PR comment to sign.
          signed-commit-message: 'chore(cla): @$contributorName has signed the CLA in #$pullRequestNo'
          # PRs that already have all authors signed will be allowed.
          allowlist: 'dependabot[bot],renovate[bot],github-actions[bot]'
          # When a PR is closed without merging, do nothing.
          lock-pullrequest-aftermerge: false
          # Comment text the bot posts when a contributor hasn't signed yet.
          custom-notsigned-prcomment: |
            Thank you for your pull request and welcome to the
            DeltaGlider Proxy community! To accept your contribution,
            we need you to sign the
            [Contributor License Agreement](https://github.com/beshu-tech/deltaglider_proxy/blob/main/CLA.md).

            By signing the CLA, you assign copyright in your contribution
            to **Beshu Limited** so the project maintainers can dual-
            license the code (open source + commercial).

            **To sign**, post the following as a single comment on this PR:
          custom-pr-sign-comment: 'I have read the CLA Document and I hereby sign the CLA'
          custom-allsigned-prcomment: |
            All contributors have signed the CLA. Thank you!
