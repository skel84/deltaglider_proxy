name: CI

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:
  workflow_call:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: read

env:
  BUILDER_IMAGE: ghcr.io/${{ github.repository }}/builder:latest
  # ── sccache: local MinIO compilation cache (NOT the CI test MinIO) ──
  RUSTC_WRAPPER: sccache
  CARGO_INCREMENTAL: "0"
  SCCACHE_BUCKET: sccache-rust
  SCCACHE_ENDPOINT: http://sccache-minio.sccache.svc.cluster.local:9000
  SCCACHE_REGION: auto
  SCCACHE_S3_USE_SSL: "false"
  AWS_ACCESS_KEY_ID: sccache
  AWS_SECRET_ACCESS_KEY: sccache-secret-key

jobs:
  verify-integration-test-registry:
    name: Integration test registry
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Verify tests/*.rs map to CI --test flags
        run: ./scripts/check-integration-tests-in-ci.sh

  verify-spdx-headers:
    name: SPDX license headers
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Every .rs file must have SPDX-License-Identifier
        run: ./scripts/check-spdx-headers.sh

  fmt:
    name: Rustfmt
    runs-on: k3s
    container:
      image: ghcr.io/beshu-tech/deltaglider_proxy/builder:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: cargo fmt
        env:
          RUSTC_WRAPPER: ""  # fmt doesn't need sccache
        run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: k3s
    container:
      image: ghcr.io/beshu-tech/deltaglider_proxy/builder:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: sccache stats (pre)
        run: sccache --show-stats
      - name: Build demo UI (required by rust-embed)
        run: cd demo/s3-browser/ui && npm ci && npm run build
      - name: cargo clippy
        run: cargo clippy --locked --all-targets --all-features -- -D warnings
      - name: sccache stats (post)
        if: always()
        run: sccache --show-stats

  # ── Test jobs: split into 3 parallel groups for ~3x faster wall-clock ──
  # Each job compiles via sccache (near-instant after first job populates cache).
  # Split by execution time: unit (~60s), integration-fast (~50s), integration-slow (~70s).

  test-unit:
    name: Unit Tests
    runs-on: k3s
    timeout-minutes: 15
    container:
      image: ghcr.io/beshu-tech/deltaglider_proxy/builder:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Build demo UI (required by rust-embed)
        run: cd demo/s3-browser/ui && npm ci && npm run build
      - name: cargo test --lib
        env:
          RUST_BACKTRACE: "1"
        run: cargo test --lib --locked

  coverage:
    name: Unit Coverage (non-blocking)
    runs-on: k3s
    timeout-minutes: 20
    # Signal, not a gate. A flaky coverage tool must not block merges.
    # When a regression is real, the PR author sees the summary in
    # the job log; when it's noise (a new file without tests added
    # alongside, a cfg-gated branch, etc.) we want to avoid burning
    # review time on it.
    continue-on-error: true
    container:
      image: ghcr.io/beshu-tech/deltaglider_proxy/builder:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install cargo-llvm-cov
        # binstall is fast (~5s) and the builder image may not ship it.
        # `--locked` pins to the lockfile-compatible version; no version
        # drift between runs.
        run: |
          if ! command -v cargo-llvm-cov >/dev/null 2>&1; then
            cargo install --locked cargo-llvm-cov
          fi
      - name: Build demo UI (required by rust-embed)
        run: cd demo/s3-browser/ui && npm ci && npm run build
      - name: Run lib tests under llvm-cov
        env:
          RUST_BACKTRACE: "1"
        run: |
          cargo llvm-cov --locked --lib --no-report
      - name: Emit summary table (top 20 worst-covered files)
        run: |
          cargo llvm-cov report --summary-only > /tmp/cov-summary.txt
          echo "## Unit-test coverage summary" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat /tmp/cov-summary.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Worst-covered files (line %)" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          # Column 10 is line-coverage %, column 1 is filename. Strip
          # the trailing % so `sort -n` orders numerically. Drop the
          # TOTAL and separator rows.
          cargo llvm-cov report \
            | awk 'NR>2 && $1 !~ /^TOTAL/ && $1 !~ /^-/ {gsub(/%/, "", $10); printf "%6s  %s\n", $10, $1}' \
            | sort -n \
            | head -20 \
            >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
      - name: Upload lcov artifact
        # LCOV file lets consumers (Codecov, Coveralls, local tooling)
        # drill into individual file / line coverage. Optional — future
        # PR-comment bots plug into this without touching the job.
        if: always()
        run: cargo llvm-cov report --lcov --output-path /tmp/lcov.info || true
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: lcov-coverage
          path: /tmp/lcov.info
          if-no-files-found: ignore

  test-integration:
    name: Integration Tests
    runs-on: k3s
    timeout-minutes: 50
    container:
      image: ghcr.io/beshu-tech/deltaglider_proxy/builder:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Build demo UI (required by rust-embed)
        run: cd demo/s3-browser/ui && npm ci && npm run build
      - name: Clean up stale config DB files
        run: |
          rm -f deltaglider_config.db deltaglider_config.db.bak .deltaglider_bootstrap_hash
          rm -f /tmp/deltaglider_config.db /tmp/deltaglider_config.db.bak /tmp/.deltaglider_bootstrap_hash
      - name: Start MinIO for tests
        run: |
          docker run -d --name minio-ci --network container:$(hostname) \
            -e MINIO_ROOT_USER=minioadmin \
            -e MINIO_ROOT_PASSWORD=minioadmin \
            minio/minio:latest server /data
          for i in $(seq 1 30); do
            mc alias set local http://localhost:9000 minioadmin minioadmin 2>/dev/null && break
            sleep 1
          done
          mc mb --ignore-existing local/deltaglider-test
          mc mb --ignore-existing local/deltaglider-data
          echo "MINIO_ENDPOINT=http://localhost:9000" >> $GITHUB_ENV
      - name: Install DeltaGlider CLI
        env:
          DEBIAN_FRONTEND: noninteractive
          PIP_DISABLE_PIP_VERSION_CHECK: "1"
        run: |
          if ! python3 -m pip --version >/dev/null 2>&1; then
            apt-get update -qq
            apt-get install -y -qq python3-pip
          fi
          python3 -m pip install --quiet --break-system-packages deltaglider
          deltaglider --version
      - name: Integration tests (fast)
        env:
          RUST_BACKTRACE: "1"
        run: |
          cargo test --locked \
            --test bootstrap_password_hash_invariant_test \
            --test auth_integration_test \
            --test concurrency_test \
            --test error_test \
            --test iam_authorization_test \
            --test iam_persona_test \
            --test iam_test \
            --test list_truncation_test \
            --test metadata_validation_test \
            --test s3_api_test \
            --test s3_backend_test \
            --test s3_compat_test \
            --test s3_integration_test \
            --test storage_resilience_test \
            --test unmanaged_objects_test \
            -- --nocapture
      - name: Interop tests (spawns proxy subprocesses)
        env:
          RUST_BACKTRACE: "1"
        run: |
          cargo test --locked --test interop_test -- --include-ignored --nocapture
      - name: Integration tests (admin, IAM, replication, lifecycle, …)
        env:
          RUST_BACKTRACE: "1"
        run: |
          cargo test --locked \
            --test admin_bulk_objects_test \
            --test browser_session_connect_test \
            --test admin_config_test \
            --test admin_login_as_test \
            --test admin_section_test \
            --test bucket_existence_test \
            --test cli_admin_test \
            --test config_sync_ha_test \
            --test config_sync_test \
            --test encryption_test \
            --test external_auth_test \
            --test iam_declarative_reconcile_test \
            --test iam_identity_test \
            --test iam_mode_test \
            --test iam_variables_clone_test \
            --test lifecycle_test \
            --test quota_test \
            --test replication_test \
            -- --nocapture
      - name: Clean up MinIO test data
        if: always()
        run: |
          mc rm --recursive --force local/deltaglider-test/ 2>/dev/null || true
          mc rm --recursive --force local/deltaglider-data/ 2>/dev/null || true
      - name: Stop MinIO
        if: always()
        run: docker rm -f minio-ci 2>/dev/null || true

  test-s3s-adapter:
    name: s3s Adapter Tests
    runs-on: k3s
    timeout-minutes: 20
    container:
      image: ghcr.io/beshu-tech/deltaglider_proxy/builder:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Build demo UI (required by rust-embed)
        run: cd demo/s3-browser/ui && npm ci && npm run build
      - name: Clean up stale config DB files
        run: |
          rm -f deltaglider_config.db deltaglider_config.db.bak .deltaglider_bootstrap_hash
          rm -f /tmp/deltaglider_config.db /tmp/deltaglider_config.db.bak /tmp/.deltaglider_bootstrap_hash
      - name: Build s3s adapter path
        env:
          RUST_BACKTRACE: "1"
        run: |
          cargo check --locked --features s3s-adapter
          cargo test --lib s3_adapter_s3s --locked --features s3s-adapter
      - name: s3s adapter parity tests
        env:
          RUST_BACKTRACE: "1"
        run: |
          cargo test --locked --features s3s-adapter \
            --test s3s_adapter_parity_test \
            -- --nocapture --test-threads=1
      - name: S3 compatibility corpus on s3s
        env:
          RUST_BACKTRACE: "1"
          DGP_S3_ADAPTER: s3s
        run: |
          cargo test --locked --features s3s-adapter \
            --test s3_compat_test \
            -- --nocapture --test-threads=1
      - name: Auth, admission, and public prefix on s3s
        env:
          RUST_BACKTRACE: "1"
          DGP_S3_ADAPTER: s3s
        run: |
          cargo test --locked --features s3s-adapter \
            --test admission_test \
            --test iam_authorization_test \
            --test iam_list_scope_test \
            --test public_prefix_list_test \
            --test public_prefix_test \
            -- --nocapture --test-threads=1
      - name: High-risk S3 semantics on s3s
        env:
          RUST_BACKTRACE: "1"
          DGP_S3_ADAPTER: s3s
        run: |
          cargo test --locked --features s3s-adapter \
            --test aws_chunked_upload_test \
            --test concurrency_test \
            --test metadata_validation_test \
            --test multipart_etag_test \
            --test recursive_delete_test \
            --test s3_correctness_test \
            --test storage_resilience_test \
            --test unmanaged_objects_test \
            -- --nocapture --test-threads=1

  test-delta:
    name: Delta & Optimization Tests
    runs-on: k3s
    timeout-minutes: 15
    container:
      image: ghcr.io/beshu-tech/deltaglider_proxy/builder:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Build demo UI (required by rust-embed)
        run: cd demo/s3-browser/ui && npm ci && npm run build
      - name: Delta, optimization, and memory tests
        env:
          RUST_BACKTRACE: "1"
        run: |
          cargo test --locked \
            --test delta_test \
            --test optimization_test \
            --test memory_test \
            -- --nocapture

  e2e-smoke:
    name: E2E smoke (embedded UI)
    runs-on: k3s
    timeout-minutes: 35
    container:
      image: ghcr.io/beshu-tech/deltaglider_proxy/builder:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Build demo UI + release binary
        env:
          RUSTC_WRAPPER: ""
        run: |
          cd demo/s3-browser/ui && npm ci && npm run build
          cd ../.. && cargo build --locked --release --bin deltaglider_proxy
      - name: Install Playwright Chromium
        run: |
          cd demo/s3-browser/ui
          npx playwright install chromium --with-deps
      - name: Smoke test /_/ shell + /_/health
        env:
          DELTAGLIDER_PROXY_BIN: ${{ github.workspace }}/target/release/deltaglider_proxy
        run: ./scripts/e2e-smoke.sh

  audit:
    name: RustSec Audit
    runs-on: k3s
    container:
      image: ghcr.io/beshu-tech/deltaglider_proxy/builder:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    continue-on-error: true
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: cargo audit
        env:
          RUSTC_WRAPPER: ""  # audit doesn't compile
        run: cargo audit

  deny:
    name: Cargo Deny
    runs-on: k3s
    container:
      image: ghcr.io/beshu-tech/deltaglider_proxy/builder:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    continue-on-error: true  # warn-only until config stabilises
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install cargo-deny
        env:
          RUSTC_WRAPPER: ""
        run: cargo install --locked cargo-deny 2>/dev/null || echo "cargo-deny install failed (non-blocking)"
      - name: cargo deny check
        env:
          RUSTC_WRAPPER: ""
        run: cargo deny check 2>&1 || true

  frontend-lint:
    name: Frontend Lint
    runs-on: k3s
    container:
      image: ghcr.io/beshu-tech/deltaglider_proxy/builder:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install dependencies
        run: cd demo/s3-browser/ui && npm ci
      # ── Blocking: ESLint with react-hooks/rules-of-hooks at error.
      #    A regression of error #310 (hooks after early returns) is
      #    caught here, before it ever ships. Warnings are still
      #    visible in logs but don't fail CI — warn budget is being
      #    managed down separately (see lint:strict). ──
      - name: ESLint (rules-of-hooks, no-unused-vars, ...)
        run: cd demo/s3-browser/ui && npm run lint
      # ── Blocking: TypeScript. `recharts` types no longer break this. ──
      - name: TypeScript type check
        run: cd demo/s3-browser/ui && npm run typecheck
      # ── Blocking: Knip detects unused files, deps, and exports. ──
      - name: Knip (dead code / unused deps)
        run: cd demo/s3-browser/ui && npm run knip
      - name: Node regression scripts (permissions + storage paths + page size)
        run: |
          cd demo/s3-browser/ui
          npm run test:permissions
          npm run test:storage-path
          npm run test:page-size
      - name: npm audit
        run: cd demo/s3-browser/ui && npm audit --audit-level=high || true  # warn-only

  docs:
    name: Docs bundling + link check + YAML examples
    runs-on: k3s
    timeout-minutes: 10
    container:
      image: ghcr.io/beshu-tech/deltaglider_proxy/builder:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      # ── Blocking: every .md under docs/product/ is registered in
      #    demo/s3-browser/ui/src/docs-imports.ts, and no dev docs
      #    (docs/dev/**) sneak into the product bundle. ──
      - name: Docs registry allow-list
        run: ./scripts/check-docs-registry.sh
      # ── Blocking: every `# validate`-tagged fenced YAML block in
      #    docs/product/**/*.md parses + validates under the real
      #    schema. Prevents example drift. Needs a built binary. ──
      - name: Build deltaglider_proxy (for config lint)
        env:
          RUSTC_WRAPPER: ""
        run: cd demo/s3-browser/ui && npm ci && npm run build && cd ../../.. && cargo build --locked --release --bin deltaglider_proxy
      - name: Validate docs YAML examples
        env:
          DELTAGLIDER_PROXY_BIN: ./target/release/deltaglider_proxy
        run: ./scripts/check-docs-yaml-examples.sh
      # ── Non-blocking: inter-doc link check.
      #    lycheeverse/lychee-action needs to install a binary at
      #    runtime, and our container (ghcr.io/.../builder) doesn't
      #    ship with the tools it expects — hit exit 127 on v0.8.8.
      #    Until we bake lychee into the builder image (follow-up),
      #    run it via `cargo install --locked lychee` here. If the
      #    install fails (rust version drift, network), treat it
      #    as warn-only so the registry + YAML guards above still
      #    gate the release.
      - name: Link check (lychee, warn-only)
        env:
          RUSTC_WRAPPER: ""
        run: |
          set +e
          cargo install --locked --quiet lychee || {
            echo "::warning::cargo install lychee failed; skipping link check"
            exit 0
          }
          lychee --no-progress --accept 200,204,301,302,429 \
            --timeout 20 --max-retries 2 --exclude-mail \
            'docs/product/**/*.md' || {
            echo "::warning::lychee found broken links; review the log"
          }
          exit 0

  config-schema:
    name: Config JSON Schema
    runs-on: k3s
    timeout-minutes: 10
    container:
      image: ghcr.io/beshu-tech/deltaglider_proxy/builder:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Build demo UI (required by rust-embed)
        run: cd demo/s3-browser/ui && npm ci && npm run build
      - name: Generate canonical JSON Schema
        run: |
          mkdir -p schema
          cargo run --locked --quiet -- config schema --out schema/deltaglider.schema.json
          echo "--- schema head ---"
          head -40 schema/deltaglider.schema.json
      - name: Verify schema accepts migrated example
        run: |
          cargo run --locked --quiet -- config migrate deltaglider_proxy.toml.example \
            --out /tmp/migrated.yaml
          # Round-trip check: loading the migrated YAML must succeed.
          cargo run --locked --quiet -- config migrate /tmp/migrated.yaml \
            --out /tmp/roundtrip.yaml
          diff /tmp/migrated.yaml /tmp/roundtrip.yaml
      - name: Upload schema artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: deltaglider-config-schema
          path: schema/deltaglider.schema.json
