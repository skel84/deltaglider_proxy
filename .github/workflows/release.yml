name: Release

on:
  push:
    tags:
      - "v*"

# Deny all permissions at workflow level — each job declares its own
permissions: {}

env:
  CARGO_TERM_COLOR: always
  BINARY_NAME: deltaglider_proxy
  DOCKERHUB_REPO: beshultd/deltaglider_proxy
  # ── sccache: local MinIO compilation cache (NOT the CI test MinIO) ──
  RUSTC_WRAPPER: sccache
  CARGO_INCREMENTAL: "0"
  SCCACHE_BUCKET: sccache-rust
  SCCACHE_ENDPOINT: http://sccache-minio.sccache.svc.cluster.local:9000
  SCCACHE_REGION: auto
  SCCACHE_S3_USE_SSL: "false"
  AWS_ACCESS_KEY_ID: sccache
  AWS_SECRET_ACCESS_KEY: sccache-secret-key

jobs:
  # ── Job 1: CI Gate ──────────────────────────────────────────────────
  # Tags are usually pushed for the same merge commit that just triggered
  # `CI` on main. Do not call the reusable CI workflow here, or the tag
  # release burns the full fmt/clippy/test/docs suite a second time.
  # Instead, wait for the existing CI run on the tagged commit to pass.
  verify-ci:
    name: Verify tagged commit passed CI
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    outputs:
      tagged_sha: ${{ steps.resolve.outputs.tagged_sha }}
      ci_run_url: ${{ steps.wait.outputs.ci_run_url }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Resolve tag target
        id: resolve
        run: |
          set -euo pipefail
          tagged_sha="$(git rev-list -n 1 "refs/tags/${GITHUB_REF_NAME}")"
          if [ -z "$tagged_sha" ]; then
            echo "::error::failed to resolve ${GITHUB_REF_NAME} to a commit"
            exit 1
          fi
          echo "Tagged commit: $tagged_sha"
          echo "tagged_sha=$tagged_sha" >> "$GITHUB_OUTPUT"

      - name: Wait for existing CI on tagged commit
        id: wait
        env:
          GH_TOKEN: ${{ github.token }}
          TAGGED_SHA: ${{ steps.resolve.outputs.tagged_sha }}
        run: |
          set -euo pipefail

          url="${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/actions/workflows/ci.yml/runs?head_sha=${TAGGED_SHA}&per_page=20"
          deadline=$((SECONDS + 2700)) # 45 minutes: longer than the current CI timeout budget.

          while true; do
            runs_json="$(curl -fsSL \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "$url")"

            success_url="$(jq -r '
              .workflow_runs
              | map(select(.status == "completed" and .conclusion == "success"))
              | sort_by(.created_at)
              | last
              | .html_url // empty
            ' <<< "$runs_json")"

            if [ -n "$success_url" ]; then
              echo "CI already passed for ${TAGGED_SHA}: ${success_url}"
              echo "ci_run_url=${success_url}" >> "$GITHUB_OUTPUT"
              exit 0
            fi

            active_count="$(jq '[.workflow_runs[] | select(.status != "completed")] | length' <<< "$runs_json")"
            failed_count="$(jq '[.workflow_runs[] | select(.status == "completed" and (.conclusion | IN("failure", "cancelled", "timed_out", "action_required")))] | length' <<< "$runs_json")"
            total_count="$(jq '.workflow_runs | length' <<< "$runs_json")"

            if [ "$SECONDS" -ge "$deadline" ]; then
              echo "::error::timed out waiting for CI to pass on ${TAGGED_SHA}"
              echo "::error::found ${total_count} CI run(s), ${active_count} active, ${failed_count} failed/cancelled/timed out, 0 successful"
              exit 1
            fi

            if [ "$active_count" -eq 0 ] && [ "$failed_count" -gt 0 ]; then
              echo "::error::CI has no successful run for ${TAGGED_SHA}; latest matching runs are failed/cancelled/timed out"
              jq -r '.workflow_runs[] | "- \(.status) / \(.conclusion // "n/a"): \(.html_url)"' <<< "$runs_json"
              exit 1
            fi

            if [ "$total_count" -eq 0 ]; then
              echo "No CI run for ${TAGGED_SHA} yet; waiting..."
            else
              echo "Waiting for CI on ${TAGGED_SHA}: ${active_count} active, ${failed_count} failed/cancelled/timed out, 0 successful"
            fi
            sleep 30
          done

  # ── Job 2: Validate ─────────────────────────────────────────────────
  validate:
    name: Validate Release
    needs: verify-ci
    runs-on: k3s
    container:
      image: ghcr.io/beshu-tech/deltaglider_proxy/builder:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    permissions:
      contents: read
      packages: read
    outputs:
      version: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Stamp version from git tag into Cargo.toml
        id: meta
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          echo "Tag version: $TAG_VERSION"

          # Validate semver format
          if ! echo "$TAG_VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+'; then
            echo "::error::Tag $GITHUB_REF_NAME is not valid semver"
            exit 1
          fi

          # Stamp the tag version into Cargo.toml (first version = line)
          sed -i "s/^version = \".*\"/version = \"$TAG_VERSION\"/" Cargo.toml

          # Verify it took effect
          CARGO_VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "Cargo.toml now: $CARGO_VERSION"
          if [ "$TAG_VERSION" != "$CARGO_VERSION" ]; then
            echo "::error::Failed to stamp version into Cargo.toml"
            exit 1
          fi

          echo "version=$TAG_VERSION" >> "$GITHUB_OUTPUT"

      - name: Verify Cargo.lock is committed
        run: |
          if [ ! -f Cargo.lock ]; then
            echo "::error::Cargo.lock is not committed — release builds require a lockfile"
            exit 1
          fi

      - name: Build demo UI (required by rust-embed)
        run: cd demo/s3-browser/ui && npm ci && npm run build

      - name: Dry-run build check
        run: cargo check

  # ── Job 3a: Build Linux x86_64 (self-hosted, builder image) ────────
  # Depends on verify-ci (not validate) — builds start as soon as CI passes.
  # validate runs in parallel as a sanity check; finalize waits for both.
  build-linux-x86_64:
    name: Build x86_64-unknown-linux-gnu
    needs: verify-ci
    runs-on: k3s
    container:
      image: ghcr.io/beshu-tech/deltaglider_proxy/builder:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Stamp version from git tag
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          sed -i "s/^version = \".*\"/version = \"$TAG_VERSION\"/" Cargo.toml

      - name: Build demo UI (required by rust-embed)
        run: cd demo/s3-browser/ui && npm ci && npm run build

      - name: Build
        run: cargo build --release --target x86_64-unknown-linux-gnu

      - name: Prepare artifacts
        run: |
          cd target/x86_64-unknown-linux-gnu/release
          strip ${{ env.BINARY_NAME }} || true
          tar czvf ../../../${{ env.BINARY_NAME }}-${{ github.ref_name }}-x86_64-unknown-linux-gnu.tar.gz ${{ env.BINARY_NAME }}

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ env.BINARY_NAME }}-x86_64-unknown-linux-gnu
          path: ${{ env.BINARY_NAME }}-${{ github.ref_name }}-x86_64-unknown-linux-gnu.*
          if-no-files-found: error
          retention-days: 1

  # ── Job 3b: Build non-x86_64 targets (GitHub-hosted runners) ───────
  build-other:
    name: Build ${{ matrix.target }}
    needs: verify-ci
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    env:
      # Disable sccache for non-k3s runners (no access to local MinIO)
      RUSTC_WRAPPER: ""
      CARGO_INCREMENTAL: "1"
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux ARM64 (native on Blacksmith ARM)
          - target: aarch64-unknown-linux-gnu
            os: blacksmith-4vcpu-ubuntu-2404-arm

          # macOS x86_64 (Intel)
          - target: x86_64-apple-darwin
            os: macos-latest

          # macOS ARM64 (Apple Silicon)
          - target: aarch64-apple-darwin
            os: macos-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Stamp version from git tag
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          sed -i'' -e "s/^version = \".*\"/version = \"$TAG_VERSION\"/" Cargo.toml

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: demo/s3-browser/ui/package-lock.json
      - name: Build demo UI (required by rust-embed)
        run: cd demo/s3-browser/ui && npm ci && npm run build

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@4be9e76fd7c4901c61fb841f559994984270fce7 # stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2.8.2
        with:
          key: release-${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Prepare artifacts
        run: |
          cd target/${{ matrix.target }}/release
          strip ${{ env.BINARY_NAME }} || true
          tar czvf ../../../${{ env.BINARY_NAME }}-${{ github.ref_name }}-${{ matrix.target }}.tar.gz ${{ env.BINARY_NAME }}

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ env.BINARY_NAME }}-${{ matrix.target }}
          path: ${{ env.BINARY_NAME }}-${{ github.ref_name }}-${{ matrix.target }}.*
          if-no-files-found: error
          retention-days: 1

  # ── Job 4: Docker (per-platform native builds + manifest merge) ────
  # Two native builds in parallel (no QEMU), then a manifest job merges them.
  # This cuts ARM64 build time from ~40min (QEMU) to ~6min (native).
  docker-build:
    name: Docker ${{ matrix.platform }}
    needs: verify-ci
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
    env:
      RUSTC_WRAPPER: ""  # Docker build has its own caching
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: k3s
          - platform: linux/arm64
            runner: blacksmith-4vcpu-ubuntu-2404-arm
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Stamp version from git tag
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          sed -i'' -e "s/^version = \".*\"/version = \"$TAG_VERSION\"/" Cargo.toml

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2 # v3.10.0

      - name: Log in to DockerHub
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3.4.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@902fa8ec7d6ecbf8d84d538b9b233a880e428804 # v5.7.0
        with:
          images: ${{ env.DOCKERHUB_REPO }}

      - name: Build and push by digest (attempt 1)
        id: build_a
        continue-on-error: true
        uses: docker/build-push-action@14487ce63c7a62a4a324b0bfb37086795e31c6c1 # v6.16.0
        with:
          context: .
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          outputs: type=image,name=${{ env.DOCKERHUB_REPO }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=${{ matrix.platform }}
          cache-to: type=gha,scope=${{ matrix.platform }},mode=max
          # Disable provenance / SBOM attestations. With them enabled,
          # build-push-action publishes both the canonical image AND an
          # attestation sidecar — and the merge step below picks up the
          # sidecar digest via the filename-based glob, feeding it back
          # into `imagetools create` which then INCLUDES every child
          # manifest of the attestation index into the final tag's
          # OCI index. Result: the published `:0.8.1` index grows one
          # extra `architecture: unknown` + 4–5 stale `amd64` entries
          # per pipeline run, and amd64 hosts resolve to a stale
          # binary. Upstream SBOM/provenance for releases is generated
          # separately by the Create Release job via cargo sbom +
          # attest-build-provenance, so disabling it here is a no-op
          # on our release attestation story.
          provenance: false
          sbom: false

      - name: Build and push by digest (attempt 2 after transient failure)
        id: build_b
        if: steps.build_a.outcome == 'failure'
        uses: docker/build-push-action@14487ce63c7a62a4a324b0bfb37086795e31c6c1 # v6.16.0
        with:
          context: .
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          outputs: type=image,name=${{ env.DOCKERHUB_REPO }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=${{ matrix.platform }}
          cache-to: type=gha,scope=${{ matrix.platform }},mode=max
          provenance: false
          sbom: false

      - name: Verify at least one docker push attempt succeeded
        run: |
          set -euo pipefail
          if [ "${{ steps.build_a.outcome }}" = "success" ] || [ "${{ steps.build_b.outcome }}" = "success" ]; then
            exit 0
          fi
          echo "::error::both docker build/push attempts failed for ${{ matrix.platform }}"
          exit 1

      # CRITICAL: write the digest marker into a RUN-SCOPED directory
      # (never `/tmp/digests` — on persistent self-hosted runners that
      # path accumulates markers from every prior release, and the
      # later `Upload digest` step glob-uploads all of them into one
      # artifact. The manifest-merge job then composes ALL historical
      # digests into the OCI index and DockerHub hands clients one of
      # the stale amd64 images at pull time. This is exactly the
      # "v0.8.10 tag serves April 8 binary" regression.)
      #
      # We also upload by EXACT path, not by glob, so a runner
      # mis-configuration that pre-populates the run-scoped dir can't
      # silently re-introduce the bug.
      - name: Export digest
        id: export
        run: |
          set -euo pipefail
          digest_dir="${RUNNER_TEMP}/dgp-digest"
          rm -rf "$digest_dir"
          mkdir -p "$digest_dir"
          digest="${{ steps.build_a.outputs.digest }}"
          if [ -z "$digest" ]; then
            digest="${{ steps.build_b.outputs.digest }}"
          fi
          if [ -z "$digest" ]; then
            echo "::error::build step produced no digest output — refusing to upload an empty marker"
            exit 1
          fi
          marker="$digest_dir/${digest#sha256:}"
          touch "$marker"
          echo "digest_path=$marker" >> "$GITHUB_OUTPUT"
          echo "digest_dir=$digest_dir" >> "$GITHUB_OUTPUT"
          # Sanity: EXACTLY one file must exist in the run-scoped dir.
          count=$(find "$digest_dir" -maxdepth 1 -type f | wc -l)
          if [ "$count" -ne 1 ]; then
            echo "::error::expected exactly 1 digest marker, found $count in $digest_dir"
            ls -la "$digest_dir"
            exit 1
          fi

      - name: Upload digest
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: docker-digest-${{ matrix.platform == 'linux/amd64' && 'amd64' || 'arm64' }}
          # EXACT path — not a glob — so we upload only the digest we
          # just produced. Belt-and-braces with the rm -rf above.
          path: ${{ steps.export.outputs.digest_path }}
          if-no-files-found: error
          retention-days: 1

  docker-merge:
    name: Docker manifest merge
    needs: [validate, docker-build]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      RUSTC_WRAPPER: ""
    steps:
      - name: Download digests
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: /tmp/digests
          pattern: docker-digest-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2 # v3.10.0

      - name: Log in to DockerHub
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3.4.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker metadata (tags)
        id: meta
        uses: docker/metadata-action@902fa8ec7d6ecbf8d84d538b9b233a880e428804 # v5.7.0
        with:
          images: ${{ env.DOCKERHUB_REPO }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest

      # Defense-in-depth: verify we have EXACTLY the digests we expect
      # before composing the manifest. The docker-build matrix produces
      # one file per platform (linux/amd64, linux/arm64) → 2 files. If
      # the upload step regressed or a runner had leftover markers,
      # this catches it here instead of silently publishing a stale
      # multi-arch index. (See the v0.8.10 post-mortem: 9 stale
      # markers shipped alongside 1 fresh one, and the April 8 amd64
      # won the arbitration at pull time.)
      - name: Verify digest file count
        working-directory: /tmp/digests
        run: |
          set -euo pipefail
          count=$(find . -maxdepth 1 -type f | wc -l)
          echo "Found $count digest marker(s):"
          ls -la
          expected=2  # amd64 + arm64
          if [ "$count" -ne "$expected" ]; then
            echo "::error::expected $expected digest markers (one per platform), found $count"
            echo "::error::this usually means stale markers leaked from a previous run via a persistent runner"
            exit 1
          fi
          # Sanity: each filename must be exactly 64 hex chars (a sha256 without prefix).
          for f in *; do
            if ! printf '%s' "$f" | grep -qE '^[0-9a-f]{64}$'; then
              echo "::error::unexpected file in digest artifact: $f"
              exit 1
            fi
          done

      - name: Create and push manifest
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ env.DOCKERHUB_REPO }}@sha256:%s ' *)

  # ── Job 5: Release ──────────────────────────────────────────────────
  release:
    name: Create Release
    needs: [validate, build-linux-x86_64, build-other, docker-merge]
    runs-on: k3s
    container:
      image: ghcr.io/beshu-tech/deltaglider_proxy/builder:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    permissions:
      contents: write
      packages: read
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts
          pattern: deltaglider_proxy-*

      - name: Flatten and generate checksums
        run: |
          cd artifacts
          # Move all archives out of per-target subdirectories
          find . -type f -name "*.tar.gz" -exec mv {} . \;
          # Remove now-empty subdirectories
          find . -mindepth 1 -type d -exec rmdir {} + 2>/dev/null || true

          # Fail if no archives were produced
          ARCHIVES=$(ls *.tar.gz 2>/dev/null | wc -l)
          if [ "$ARCHIVES" -eq 0 ]; then
            echo "::error::No release archives found — build may have failed"
            exit 1
          fi
          echo "Found $ARCHIVES release archive(s)"

          sha256sum *.tar.gz 2>/dev/null | sort -k2 > SHA256SUMS.txt
          echo "--- SHA256SUMS.txt ---"
          cat SHA256SUMS.txt

      - name: Generate SBOM
        run: |
          cargo sbom --output-format spdx_json_2_3 > artifacts/sbom-spdx.json
          echo "SBOM generated ($(wc -c < artifacts/sbom-spdx.json) bytes)"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2.5.0
        with:
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            artifacts/*.tar.gz
            artifacts/SHA256SUMS.txt
            artifacts/sbom-spdx.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync DockerHub repository description
        # `DOCKERHUB.md` is the source of truth for the repo's "Full
        # description" on hub.docker.com. Pre-automation, an operator
        # had to log into the hub UI and paste the file by hand — easy
        # to forget, easy to drift. This step uploads the file via the
        # DockerHub v2 API so the description matches what we shipped.
        #
        # Auth: same DOCKERHUB_USERNAME + DOCKERHUB_TOKEN secrets used
        # by the image push. The token must have "Read & Write" scope
        # on the repository.
        #
        # `continue-on-error: true` because a description sync failure
        # must not fail the release — the artifacts are already
        # published at this point.
        continue-on-error: true
        timeout-minutes: 5
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          REPO: ${{ env.DOCKERHUB_REPO }}
        run: |
          set -euo pipefail
          if [ ! -f DOCKERHUB.md ]; then
            echo "DOCKERHUB.md missing — skipping description sync"
            exit 0
          fi

          # Get a JWT for the v2 API. The image-push login uses the
          # registry endpoint; for repo-management calls we need
          # hub.docker.com's `users/login` endpoint.
          JWT="$(curl -fsS \
            -H "Content-Type: application/json" \
            -X POST \
            -d "{\"username\": \"${DOCKERHUB_USERNAME}\", \"password\": \"${DOCKERHUB_TOKEN}\"}" \
            https://hub.docker.com/v2/users/login/ \
            | jq -r .token)"

          if [ -z "$JWT" ] || [ "$JWT" = "null" ]; then
            echo "::warning::DockerHub login returned no token — description not synced"
            exit 0
          fi

          # PATCH the repository's full_description field. The body is
          # JSON-encoded markdown; we feed the file through `jq` so
          # newlines / quotes / backslashes are escaped correctly.
          BODY="$(jq -Rs '{full_description: .}' < DOCKERHUB.md)"
          HTTP_CODE="$(curl -sS -o /tmp/dh-resp -w '%{http_code}' \
            -H "Authorization: JWT ${JWT}" \
            -H "Content-Type: application/json" \
            -X PATCH \
            -d "$BODY" \
            "https://hub.docker.com/v2/repositories/${REPO}/")"

          if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
            echo "DockerHub description synced (HTTP $HTTP_CODE)"
          else
            echo "::warning::DockerHub description sync returned HTTP $HTTP_CODE"
            cat /tmp/dh-resp
          fi

      - name: Attest build provenance
        uses: actions/attest-build-provenance@96278af6caaf10aea03fd8d33a09a777ca52d62f # v3.2.0
        timeout-minutes: 10
        continue-on-error: true
        with:
          subject-path: "artifacts/*.tar.gz"
