# Speed up linking. lld is ~3-5× faster than the default GNU `ld` for
# release builds and noticeably faster for incremental dev builds.
# Requires clang + ld.lld on PATH; any rust-toolchain.toml stable pin
# (rustc ≥ 1.76) supports the flags below.
[target.x86_64-unknown-linux-gnu]
linker = "clang"
rustflags = ["-C", "link-arg=-fuse-ld=lld"]
