# =============================================================================
# DeltaGlider Proxy — production configuration (Infrastructure-as-Code)
# =============================================================================
# Generated from the current prod configuration via the admin config export
# (`GET /_/api/admin/config/export` + `/config/declarative-iam-export`).
#
# SECRETS: this file is SECRET-FREE and safe to commit. Every secret is either
#   (a) injected at runtime as a DGP_* env var (read natively by DGP), OR
#   (b) a dollar-brace placeholder (VAR / VAR:-default syntax) that DGP expands
#       in-process against the environment when it loads this file — no external
#       envsubst step. An unset placeholder fails loudly at load.
# NOTE: expansion is text-level, so do NOT write a literal dollar-brace example
# in a comment unless you escape the dollar by doubling it.
#
# IAM is in `declarative` mode: this YAML is the source of truth for users,
# groups, OAuth providers, and mapping rules. Admin-API IAM mutations return
# 403; reconcile happens on every `config apply`.
#
# Validate before deploy:  deltaglider_proxy config lint deltaglider_proxy.yaml
# =============================================================================

storage:
  # Named backends are the source of truth (the legacy singular `backend:` is
  # ignored at runtime once `backends:` is non-empty, so it's omitted). Creds are
  # inline placeholders DGP expands from the env: the DGP_BE_AWS_* env vars only
  # feed the singular backend, NOT named backends, so named-backend secrets must
  # be placeholders here.
  backends:
    - name: HetznerHelsinki1
      type: s3
      endpoint: https://hel1.your-objectstorage.com
      region: hel1
      force_path_style: true
      access_key_id: ${env:DGP_BACKEND_HETZNER_ACCESS_KEY_ID}
      secret_access_key: ${env:DGP_BACKEND_HETZNER_SECRET_ACCESS_KEY}

    # Local filesystem backend with at-rest encryption (proxy-side
    # AES-256-GCM). The data lives on the container volume; the key is an
    # env placeholder — REQUIRED to read every object already written under
    # this key. Losing it makes those objects unrecoverable.
    - name: LOCAL1BE
      type: filesystem
      path: ./data
      encryption:
        mode: aes256-gcm-proxy
        key: ${env:DGP_BACKEND_LOCAL1BE_AES_KEY}
  default_backend: HetznerHelsinki1

  buckets:
    beshu:
      public_prefixes:
        - ror/libs/
    # REVIEW: the three buckets below look like staging experiments that made
    # it into the prod config (they route to the local-disk backend). Prune
    # here AND in prod if they're not load-bearing.
    didi:
      backend: LOCAL1BE
    pippo:
      backend: LOCAL1BE
    reenc-demo:
      backend: LOCAL1BE

  # Background replication machinery is ON (workers + scheduler); the single
  # rule is currently DISABLED — kept for one-click re-enable from the GUI.
  replication:
    enabled: true
    tick_interval: 30s
    lease_ttl: 60s
    heartbeat_interval: 20s
    max_failures_retained: 100
    rules:
      - name: mirror-debug-to-local
        enabled: false
        source:
          bucket: debug
          prefix: builds/
        destination:
          bucket: pippo
          prefix: mirror/
        interval: 24h
        batch_size: 100
        replicate_deletes: false
        conflict: newer-wins
        include_globs: []
        exclude_globs:
          - .deltaglider/**

  # Lifecycle is fully OFF (subsystem disabled AND the rule disabled).
  lifecycle:
    enabled: false
    tick_interval: 1h
    max_failures_retained: 100
    rules:
      - name: expire-old-builds
        enabled: false
        bucket: debug
        prefix: builds/
        action: delete
        expire_after: 30d
        include_globs: []
        exclude_globs:
          - .deltaglider/**
        batch_size: 100

access:
  # YAML owns IAM. The encrypted DB is reconciled to match this on every apply.
  iam_mode: declarative

  # Bootstrap SigV4 pair. REQUIRED for the proxy to start: the startup auth gate
  # accepts either these creds or `authentication: none`, and it runs BEFORE the
  # declarative IAM users are reconciled into the (fresh) DB — so without this a
  # cold start fails with "No authentication configured". This is the scripted-
  # client / pre-IAM credential, distinct from the admin-GUI bootstrap password.
  access_key_id: ${env:DGP_BOOTSTRAP_ACCESS_KEY_ID}
  secret_access_key: ${env:DGP_BOOTSTRAP_SECRET_ACCESS_KEY}

  iam_users:
    - name: Simone Scarduzio
      access_key_id: AKF09PYNJ4TR0NSTPVW6
      secret_access_key: ${env:DGP_USER_SIMONE_SECRET}
      enabled: true
      groups:
        - Administrators
        - ROR Staff

    - name: ror-ci-rw
      access_key_id: ror-ci-rw
      secret_access_key: ${env:DGP_USER_ROR_CI_RW_SECRET}
      enabled: true
      permissions:
        - effect: Allow
          actions: [list, write, read]
          resources: ["beshu/ror/builds/*"]
        - effect: Allow
          actions: [read, write, list]
          resources: ["beshu/ror/e2e_reports/*"]

    - name: ror-api-ro
      access_key_id: ror-api-ro
      secret_access_key: ${env:DGP_USER_ROR_API_RO_SECRET}
      enabled: true
      permissions:
        - effect: Allow
          actions: [read, list]
          resources: ["beshu/ror/*"]

    # NOTE: OAuth-provisioned ROR Staff members (e.g. Mateusz Kołodziejczyk,
    # Dawid Poliszak) are NOT listed here. They are auto-created on first Google
    # login with an auto-generated access key, and the `email_domain:
    # readonlyrest.com -> ROR Staff` mapping rule (below) assigns their group.
    # Listing them explicitly would fight the auto-provisioning. Only users with
    # STATIC credentials (CI keys, the bootstrap admin) belong in iam_users.

    - name: rorkbn-ci
      access_key_id: rorkbn-ci
      secret_access_key: ${env:DGP_USER_RORKBN_CI_SECRET}
      enabled: true
      groups:
        - ROR Staff

    - name: xperi
      access_key_id: xperi
      secret_access_key: ${env:DGP_USER_XPERI_SECRET}
      enabled: true
      groups:
        - Customers

    # NOTE: `legacy-admin` is a wildcard-admin with access_key_id `admin` and
    # INLINE permissions (not via the Administrators group). REVIEW: consider
    # folding into the Administrators group or removing if superseded.
    - name: legacy-admin
      access_key_id: admin
      secret_access_key: ${env:DGP_USER_LEGACY_ADMIN_SECRET}
      enabled: true
      permissions:
        - effect: Allow
          actions: ["*"]
          resources: ["*"]

  iam_groups:
    - name: ROR Staff
      description: Read builds, e2e reports, and RW own scrap space
      permissions:
        - effect: Allow
          actions: [read, list]
          resources: ["beshu/ror/builds/*"]
        - effect: Allow
          actions: ["*"]
          resources: ["debug/scrap/*"]
        - effect: Allow
          actions: [read, list]
          resources: ["beshu/ror/e2e_reports/*"]
        - effect: Allow
          actions: [list]
          resources: ["beshu/*"]
          conditions:
            StringLike:
              s3:prefix:
                - ror/
                - ror/builds/
                - ror/e2e_reports/
                - ror/lib/
        - effect: Allow
          actions: [list, read]
          resources: ["ror/lib/*"]

    - name: Administrators
      description: DGP Admins
      permissions:
        - effect: Allow
          actions: ["*"]
          resources: ["*"]

    - name: Customers
      description: Scrap upload folder for customers
      permissions:
        - effect: Allow
          actions: [read, write, delete]
          resources: ["debug/scrap/customers/${iam:username}/*"]
        - effect: Allow
          actions: [list]
          resources: ["debug"]
          conditions:
            StringLike:
              s3:prefix:
                - ""
                - scrap/
                - scrap/customers/
                - scrap/customers/${iam:username}/
                - scrap/customers/${iam:username}/*

  auth_providers:
    - name: goog
      provider_type: oidc
      enabled: true
      priority: 0
      display_name: Google
      client_id: 479270857704-gvs5pjf3284i587i3qccqh08ihuq9tcc.apps.googleusercontent.com
      issuer_url: https://accounts.google.com
      scopes: openid email profile
      client_secret: ${env:DGP_GOOGLE_OAUTH_CLIENT_SECRET}

  group_mapping_rules:
    - priority: 0
      match_type: email_domain
      match_field: email
      match_value: readonlyrest.com
      group: ROR Staff
    - priority: 0
      match_type: email_exact
      match_field: email
      match_value: simone@readonlyrest.com
      group: Administrators

advanced:
  # In prod the proxy listens on all interfaces (export shows the local
  # 127.0.0.1 override — set the real prod bind here / via DGP_LISTEN_ADDR).
  listen_addr: ${env:DGP_LISTEN_ADDR}
  max_object_size: 536870912   # 512 MiB
