# =============================================================================
# DeltaGlider Proxy — production deployment (docker compose)
# =============================================================================
# Deploys DGP from the IaC pair in this directory:
#   - deltaglider_proxy.yaml   (config structure, ${VAR} secret placeholders)
#   - secrets.env              (real secret values — gitignored; see README)
#
# DGP expands ${VAR} / ${VAR:-default} in the config itself (in-process, before
# parsing), so the YAML is mounted as-is and the env supplies the values — no
# envsubst / init-render step. An unset ${VAR} fails the proxy loudly at load.
#
# Usage:
#   1. Produce secrets.env (./backup-zip-to-secrets-env.sh <backup.zip> secrets.env)
#   2. docker compose up -d
#   3. https://<host>:9000/_/   (admin GUI) ; S3 API on the same port
# =============================================================================

services:
  # One-time: make the config volume writable by the proxy's `dg` user (999), so
  # it can create the encrypted IAM DB there. (The image runs as non-root; a
  # fresh named volume is root-owned.) No rendering happens here anymore.
  init-perms:
    image: beshultd/deltaglider_proxy:${DGP_IMAGE_TAG:-1.4.0}
    user: "0:0"
    entrypoint: ["/bin/sh", "-c", "chown 999:999 /etc/deltaglider_proxy && chmod 750 /etc/deltaglider_proxy"]
    volumes:
      - dgp-config:/etc/deltaglider_proxy
    restart: "no"

  dgp:
    # Override with DGP_IMAGE_TAG (e.g. a newer release, or `latest`).
    image: beshultd/deltaglider_proxy:${DGP_IMAGE_TAG:-1.4.0}
    depends_on:
      init-perms:
        condition: service_completed_successfully
    # env_file supplies BOTH the native DGP_* vars AND the ${VAR} secrets the
    # config references — DGP reads the file, expands the ${VAR}s against this
    # environment, and overlays the DGP_* overrides. Single source of truth.
    env_file:
      - secrets.env
    environment:
      DGP_CONFIG: /etc/deltaglider_proxy/deltaglider_proxy.yaml
    ports:
      - "9000:9000"
    volumes:
      # The config template, mounted read-only. DGP expands its ${VAR}s in memory
      # at load — the file on disk stays a secret-free template.
      - ./deltaglider_proxy.yaml:/etc/deltaglider_proxy/deltaglider_proxy.yaml:ro
      # Writable dir for the encrypted IAM DB (deltaglider_config.db lands in
      # DGP_CONFIG's parent dir) — must persist + be backed up.
      - dgp-config:/etc/deltaglider_proxy
      # Local scratch for delta reconstruction + caches (object data lives in the
      # S3 backend, not here, but reconstruction buffers to disk).
      - dgp-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/_/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped

volumes:
  dgp-config:    # encrypted IAM DB — back this up
  dgp-data:      # delta/reconstruction scratch + caches
